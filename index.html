<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Инженерная шпаргалка</title>

<link rel="manifest" href="manifest.json">

<style>

  
/* box-sizing:border-box; */


body{
font-family:Arial;
background:#eef2f7;
margin:0;
padding:0;
}

header{
background:#1f2937;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.search{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

.card{
background:white;
padding:16px;
margin-bottom:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:8px 14px;
background:#2563eb;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
max-width:700px;
margin:80px auto;
padding:25px;
border-radius:6px; 
max-height:80vh;
overflow:auto;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

pre{
white-space:pre-wrap;
word-wrap:break-word;
font-family:monospace;
}

</style>
</head>

<body>

<header>
Инженерная шпаргалка
</header>

<div class="container">

<input class="search" placeholder="Поиск оборудования..." onkeyup="searchEquipment(this.value)">

<div id="equipmentList"></div>

</div>

<div class="modal" id="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<div id="instructionText"></div>

</div>
</div>

<script>

let equipment = []

async function loadEquipment(){

const response = await fetch("equipment.json")

equipment = await response.json()

renderList(equipment)

}

function renderList(list){

const container=document.getElementById("equipmentList")

container.innerHTML=""

list.forEach(e=>{

container.innerHTML+=`
<div class="card">
<div>${e.name}</div>
<button onclick="showInstruction('${e.id}')">Инструкция</button>
</div>
`

})

}

function showInstruction(id){

const device = equipment.find(e => e.id === id)

document.getElementById("modal").style.display="block"

document.getElementById("instructionText").innerHTML =
"<h2>"+device.name+"</h2><pre>"+device.instruction.join('\n')+"</pre>"

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

function searchEquipment(text){

text=text.toLowerCase()

const filtered=equipment.filter(e=>e.name.toLowerCase().includes(text))

renderList(filtered)

}

loadEquipment()


if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("service-worker.js")
.then(() => {
console.log("Service Worker зарегистрирован");
})
.catch(error => {
console.log("Ошибка SW:", error);
});

}

</script>

</body>
</html>
